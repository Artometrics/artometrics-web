[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/methodology/"
  to = "/about"
  status = 301

[[redirects]]
  from = "/methodology"
  to = "/about"
  status = 301

[[redirects]]
  from = "/culture/"
  to = "/desks/culture"
  status = 301

[[redirects]]
  from = "/culture/*"
  to = "/desks/culture"
  status = 301

[[redirects]]
  from = "/atlas/"
  to = "/desks/atlas"
  status = 301

[[redirects]]
  from = "/atlas/*"
  to = "/desks/atlas"
  status = 301

[[redirects]]
  from = "/history/"
  to = "/desks/history"
  status = 301

[[redirects]]
  from = "/history/*"
  to = "/desks/history"
  status = 301

[[redirects]]
  from = "/persona/"
  to = "/desks/persona"
  status = 301

[[redirects]]
  from = "/persona/*"
  to = "/desks/persona"
  status = 301

[[redirects]]
  from = "/power/"
  to = "/desks/power"
  status = 301

[[redirects]]
  from = "/power/*"
  to = "/desks/power"
  status = 301

# Expo Router static export SPA fallback (keep after API + legacy redirects)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
