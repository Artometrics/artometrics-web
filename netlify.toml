[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/methodology/"
  to = "/about"
  status = 301

[[redirects]]
  from = "/methodology"
  to = "/about"
  status = 301

